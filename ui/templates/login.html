{% extends "base.html" %}
{% block title %}Iniciar Sesión — Sistema de Perfilado{% endblock %}
{% block body %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            
            <h1>Sistema de Perfilado</h1>
            <p class="login-subtitle">Motor de búsqueda predictivo con PageRank</p>
        </div>
        {% if error %}
        <div class="alert alert-error">
            <span>⚠️</span> {{ error }}
        </div>
        {% endif %}
        <form action="/login" method="POST" class="login-form">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Nombre de usuario" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
        </form>
        <div class="login-footer">
            <p>Usuarios disponibles: navarro, beltran, pineda, panneso</p>
        </div>
    </div>
</div>
{% endblock %}
